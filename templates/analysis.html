{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="glass-panel p-4 p-md-5">
            <h2 class="orbitron text-neon-blue mb-4 text-center"><i class="fa-solid fa-microscope"></i> Image Forensic Analysis</h2>
            
            <form id="analysisForm" onsubmit="handleAnalysis(event)">
                <div class="mb-4">
                    <div class="drop-zone" id="dropZone">
                        <i class="fa-solid fa-magnifying-glass-chart fa-3x mb-3 text-white-50"></i>
                        <p class="mb-0 text-white-50">Upload Image for Analysis</p>
                        <input type="file" id="imageInput" name="image" accept="image/*" class="d-none">
                    </div>
                    <img id="imagePreview" class="image-preview mx-auto d-block" style="max-height: 200px;">
                </div>

                <div class="loader-wrapper" id="loader">
                    <div class="cyber-loader"></div>
                    <span class="ms-3 text-neon-blue">Analyzing Image Structure...</span>
                </div>

                <button type="submit" class="btn btn-cyber w-100 py-3 mt-3" id="submitBtn">
                    <i class="fa-solid fa-radar"></i> Run Diagnostics
                </button>
            </form>

            <!-- Results Section -->
            <div id="analysisResults" class="mt-5 d-none">
                <div class="row g-4">
                    <div class="col-md-6">
                        <h4 class="text-neon-blue border-bottom border-secondary pb-2">Image Properties</h4>
                        <table class="table table-dark table-striped table-hover mt-3" style="background: transparent;">
                            <tbody id="propertiesTable">
                            </tbody>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <h4 class="text-neon-blue border-bottom border-secondary pb-2">Steganography Check</h4>
                        <table class="table table-dark table-striped table-hover mt-3" style="background: transparent;">
                            <tbody id="stegoTable">
                            </tbody>
                        </table>
                        
                        <div class="mt-4 pt-3 border-top border-secondary text-center">
                            <button id="downloadReportBtn" class="btn btn-outline-info w-100">
                                <i class="fa-solid fa-file-pdf"></i> Download PDF Report
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
