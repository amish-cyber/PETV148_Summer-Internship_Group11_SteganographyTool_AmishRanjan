<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StegShield - Forensics Toolkit</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="cyber-bg">
        <div class="stars"></div>
        <div class="twinkling"></div>
        <div class="grid-overlay"></div>
    </div>

    <nav class="navbar navbar-expand-lg glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand orbitron text-neon-blue fw-bold" href="{{ url_for('index') }}">
                <i class="fa-solid fa-shield-halved"></i> StegShield
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fa-solid fa-bars" style="color: var(--text-color);"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('encode') }}"><i class="fa-solid fa-lock"></i> Hide Secret</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('decode') }}"><i class="fa-solid fa-unlock"></i> Extract Secret</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('analysis') }}"><i class="fa-solid fa-microscope"></i> Analyze Image</a>
                    </li>
                    <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                        <button id="themeToggle" class="btn btn-sm btn-outline-info rounded-circle d-flex align-items-center justify-content-center" style="width: 36px; height: 36px; transition: all 0.3s;">
                            <i class="fa-solid fa-sun"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container main-content" style="margin-top: 100px; margin-bottom: 60px;">
        {% block content %}{% endblock %}
    </div>

    <!-- Toast Notifications (Top Right) -->
    <div class="toast-container position-fixed top-0 end-0 p-3 mt-5 pt-4">
        <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4000">
            <div class="toast-header bg-transparent text-white border-bottom-0 pb-0">
                <i class="fa-solid fa-bell me-2 text-neon-green"></i>
                <strong class="me-auto text-neon-blue orbitron">System Alert</strong>
                <button type="button" class="btn-close shadow-none" data-bs-dismiss="toast" aria-label="Close" style="filter: var(--close-btn-filter);"></button>
            </div>
            <div class="toast-body" style="color: var(--text-color); font-weight: 500;" id="toastMessage">
                Hello, world!
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
